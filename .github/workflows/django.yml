name: Django Docker CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build Check
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Auth

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Use your actual version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: System Check
      run: |
        # This confirms your Django settings and code are valid
        python manage.py check 
        python manage.py migrate

  # Job 2: Build & Push to GitHub Registry (GHCR)
  build-and-push:
    needs: build-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Auth
     
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./Auth
        file: ./Auth/Dockerfile
        push: true
        # This tags it as 'latest' in your GitHub Packages
        tags: ghcr.io/${{ github.repository }}:latest